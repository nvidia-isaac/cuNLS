name: Build & Test cuNLS

on:
  workflow_call:
    inputs:
      cuda_version:
        description: 'Full CUDA version for Docker image tag (e.g. "12.8.1")'
        required: true
        type: string
      ubuntu_version:
        description: 'Ubuntu version (e.g. "22.04" or "24.04")'
        required: true
        type: string
      platform:
        description: 'Target platform identifier (e.g. "x86_64" or "jetson")'
        required: true
        type: string
      cuda_architectures:
        description: 'Semicolon-separated CUDA compute capabilities'
        required: true
        type: string
      runner_labels:
        description: 'JSON array of runner labels (e.g. ["self-hosted","gpu"])'
        required: true
        type: string
      container_image:
        description: 'Full Docker image reference for the build container'
        required: true
        type: string

  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA version'
        required: true
        type: choice
        options:
          - '12.8.1'
          - '13.2.0'
      ubuntu_version:
        description: 'Ubuntu version'
        required: true
        type: choice
        options:
          - '22.04'
          - '24.04'
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - x86_64
          - jetson
      cuda_architectures:
        description: 'CUDA architectures'
        required: true
        type: choice
        options:
          - '75;80;86;89'
          - '75;80;86;89;100'
          - '72;87'
      runner_labels:
        description: 'Runner labels JSON'
        required: true
        type: choice
        options:
          - '["self-hosted","gpu"]'
      container_image:
        description: 'Container image'
        required: true
        type: choice
        options:
          - 'nvcr.io/cunls/cunls-ci:cuda12-ubuntu22.04-x86_64'
          - 'nvcr.io/cunls/cunls-ci:cuda12-ubuntu24.04-x86_64'
          - 'nvcr.io/cunls/cunls-ci:cuda13-ubuntu22.04-x86_64'
          - 'nvcr.io/cunls/cunls-ci:cuda13-ubuntu24.04-x86_64'

jobs:
  build-and-test:
    name: "${{ inputs.platform }} / ubuntu-${{ inputs.ubuntu_version }} / cuda-${{ inputs.cuda_version }}"
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    container:
      image: ${{ inputs.container_image }}
      options: --gpus all
    timeout-minutes: 120

    env:
      CCACHE_DIR: /ccache
      CCACHE_MAXSIZE: 2G
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_CUDA_COMPILER_LAUNCHER: ccache

    steps:
      - name: Verify GPU access
        run: nvidia-smi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /ccache
          key: ccache-${{ inputs.platform }}-cuda${{ inputs.cuda_version }}-ubuntu${{ inputs.ubuntu_version }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ inputs.platform }}-cuda${{ inputs.cuda_version }}-ubuntu${{ inputs.ubuntu_version }}-

      - name: Zero ccache stats
        run: ccache --zero-stats --show-config || true

      - name: Build & Test
        uses: ./.github/actions/cmake-build
        id: build
        with:
          cuda_architectures: ${{ inputs.cuda_architectures }}
          build_type: Release
          build_testing: 'ON'

      - name: Print ccache stats
        if: always()
        run: ccache --show-stats || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.platform }}-cuda${{ inputs.cuda_version }}-ubuntu${{ inputs.ubuntu_version }}
          path: ${{ steps.build.outputs.test_results }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload library artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cunls-${{ inputs.platform }}-cuda${{ inputs.cuda_version }}-ubuntu${{ inputs.ubuntu_version }}
          path: |
            build/bin/libcunls.so
            build/bin/libcunls.a
          retention-days: 30
          if-no-files-found: warn
