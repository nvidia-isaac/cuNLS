name: Build CI Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.ci'
      - '.github/workflows/docker-ci.yml'
  workflow_dispatch:

env:
  REGISTRY: nvcr.io
  IMAGE_BASE: nvcr.io/cunls/cunls-ci

jobs:
  build-ci-images:
    name: "${{ matrix.platform }} / ubuntu-${{ matrix.ubuntu }} / cuda-${{ matrix.cuda_major }}"
    runs-on: ${{ fromJson(matrix.build_runner) }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 images — built on nvidia-isaac shared GPU runners
          - platform: x86_64
            ubuntu: "22.04"
            cuda: "12.8.1"
            cuda_major: "12"
            tag_suffix: "cuda12-ubuntu22.04-x86_64"
            build_runner: '["self-hosted","gpu"]'

          - platform: x86_64
            ubuntu: "22.04"
            cuda: "13.2.0"
            cuda_major: "13"
            tag_suffix: "cuda13-ubuntu22.04-x86_64"
            build_runner: '["self-hosted","gpu"]'

          - platform: x86_64
            ubuntu: "24.04"
            cuda: "12.8.1"
            cuda_major: "12"
            tag_suffix: "cuda12-ubuntu24.04-x86_64"
            build_runner: '["self-hosted","gpu"]'

          - platform: x86_64
            ubuntu: "24.04"
            cuda: "13.2.0"
            cuda_major: "13"
            tag_suffix: "cuda13-ubuntu24.04-x86_64"
            build_runner: '["self-hosted","gpu"]'

          # ----------------------------------------------------------------
          # aarch64 images — DISABLED pending infra changes
          #
          # Jetson runners are static shared devices; building Docker images
          # on them blocks other teams. Preferred path: cross-build on x86
          # or wait for dedicated ARM64 build capacity.
          #
          # To re-enable: uncomment and set build_runner to the confirmed
          # Jetson runner labels from the RPT team.
          # ----------------------------------------------------------------
          # - platform: aarch64
          #   ubuntu: "22.04"
          #   cuda: "12.8.1"
          #   cuda_major: "12"
          #   tag_suffix: "cuda12-ubuntu22.04-aarch64"
          #   build_runner: 'TBD — set after RPT confirms Jetson runner labels'
          #
          # - platform: aarch64
          #   ubuntu: "22.04"
          #   cuda: "13.2.0"
          #   cuda_major: "13"
          #   tag_suffix: "cuda13-ubuntu22.04-aarch64"
          #   build_runner: 'TBD'
          #
          # - platform: aarch64
          #   ubuntu: "24.04"
          #   cuda: "12.8.1"
          #   cuda_major: "12"
          #   tag_suffix: "cuda12-ubuntu24.04-aarch64"
          #   build_runner: 'TBD'
          #
          # - platform: aarch64
          #   ubuntu: "24.04"
          #   cuda: "13.2.0"
          #   cuda_major: "13"
          #   tag_suffix: "cuda13-ubuntu24.04-aarch64"
          #   build_runner: 'TBD'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: NGC Login
        uses: ./.github/actions/ngc-login
        with:
          ngc-api-key: ${{ secrets.NGC_API_KEY }}

      - name: Build CI image
        run: |
          docker build \
            --build-arg CUDA_VERSION=${{ matrix.cuda }} \
            --build-arg UBUNTU_VERSION=${{ matrix.ubuntu }} \
            -f docker/Dockerfile.ci \
            -t "${{ env.IMAGE_BASE }}:${{ matrix.tag_suffix }}" \
            -t "${{ env.IMAGE_BASE }}:${{ matrix.tag_suffix }}-${{ github.sha }}" \
            .

      - name: Smoke test — verify CUDA toolkit inside image
        run: |
          docker run --rm "${{ env.IMAGE_BASE }}:${{ matrix.tag_suffix }}" \
            bash -c "nvcc --version && cmake --version && gcc --version"

      - name: Push to NGC
        run: |
          docker push "${{ env.IMAGE_BASE }}:${{ matrix.tag_suffix }}"
          docker push "${{ env.IMAGE_BASE }}:${{ matrix.tag_suffix }}-${{ github.sha }}"
