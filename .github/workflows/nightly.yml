name: Nightly Build & Test

on:
  schedule:
    # 2:30 AM UTC — offset from the hour to reduce contention on shared infrastructure
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        type: boolean
        default: false
        description: 'Force build even without recent changes'

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-changes:
    name: Check for recent changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect commits in the last 24 hours
        id: decide
        run: |
          COMMIT_COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
          FORCE="${{ github.event.inputs.force_build }}"
          if [ "${COMMIT_COUNT}" -gt 0 ] || [ "${FORCE}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Building: ${COMMIT_COUNT} commit(s) in last 24h, force=${FORCE}"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: no commits in last 24h and force=${FORCE}"
          fi

  build-matrix:
    name: "x86_64 / ubuntu-${{ matrix.ubuntu }} / cuda-${{ matrix.cuda }}"
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: [self-hosted, gpu]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - { ubuntu: "22.04", cuda: "12.8.1", archs: "75;80;86;89" }
          - { ubuntu: "22.04", cuda: "13.2.0", archs: "75;80;86;89;100" }
          - { ubuntu: "24.04", cuda: "12.8.1", archs: "75;80;86;89" }
          - { ubuntu: "24.04", cuda: "13.2.0", archs: "75;80;86;89;100" }

          # Jetson (aarch64) — DISABLED pending infra changes.
          # To re-enable: add entries with archs: "72;87" and the confirmed
          # Jetson runner labels from the RPT team.

    steps:
      - name: Verify GPU
        run: nvidia-smi

      - uses: actions/checkout@v5

      - name: Build CI image
        run: |
          docker build \
            --build-arg CUDA_VERSION=${{ matrix.cuda }} \
            --build-arg UBUNTU_VERSION=${{ matrix.ubuntu }} \
            -f docker/Dockerfile.ci -t cunls-ci:local .

      - name: Build & Test
        run: |
          docker run --rm --gpus all \
            -v "${{ github.workspace }}:/workspace" -w /workspace \
            cunls-ci:local bash -c '
              echo "::group::CMAKE CONFIGURE"
              cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CUDA_ARCHITECTURES="${{ matrix.archs }}" \
                -DBUILD_TESTING=ON -G "Unix Makefiles"
              echo "::endgroup::"

              echo "::group::BUILD"
              cmake --build build -j$(nproc)
              echo "::endgroup::"

              echo "::group::TEST"
              cd build && mkdir -p test-results
              ctest --output-on-failure --output-junit test-results/results.xml
              echo "::endgroup::"
            '

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-x86_64-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: build/test-results/results.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Upload library artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cunls-x86_64-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: |
            build/bin/libcunls.so
            build/bin/libcunls.a
          retention-days: 30
          if-no-files-found: warn

  nightly-status:
    name: Nightly status & release
    runs-on: ubuntu-latest
    if: always()
    needs: [check-changes, build-matrix]
    permissions:
      contents: write
    steps:
      - name: Check result
        id: check
        run: |
          if [ "${{ needs.check-changes.outputs.should_build }}" = "false" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Nightly skipped: no changes in last 24 hours."
          elif [ "${{ needs.build-matrix.result }}" != "success" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "One or more nightly builds failed: ${{ needs.build-matrix.result }}"
            exit 1
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "All nightly builds passed — creating release."
          fi

      - uses: actions/checkout@v5
        if: steps.check.outputs.skip == 'false'

      - name: Download all artifacts
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate release notes and package assets
        if: steps.check.outputs.skip == 'false'
        id: release-notes
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          mkdir -p release-assets

          # Generate test summary table
          cat > release-notes.md << 'HEADER'
          ## Test Results

          | Configuration | Tests | Passed | Failed | Time |
          |---|---|---|---|---|
          HEADER
          sed -i 's/^          //' release-notes.md

          for dir in artifacts/test-results-*; do
            [ -d "$dir" ] || continue
            CONFIG=$(basename "$dir" | sed 's/test-results-//' | sed 's/-/ \/ /g' | sed 's/cuda/cuda-/' | sed 's/ubuntu/ubuntu-/')
            XML="$dir/results.xml"
            if [ -f "$XML" ]; then
              TESTS=$(grep -oP 'tests="\K[0-9]+' "$XML" | head -1 || echo "?")
              FAILURES=$(grep -oP 'failures="\K[0-9]+' "$XML" | head -1 || echo "?")
              TIME=$(grep -oP 'time="\K[0-9.]+' "$XML" | head -1 || echo "?")
              PASSED=$((TESTS - FAILURES))
              echo "| ${CONFIG} | ${TESTS} | ${PASSED} | ${FAILURES} | ${TIME}s |" >> release-notes.md
              cp "$XML" "release-assets/$(basename "$dir").xml"
            fi
          done

          echo "" >> release-notes.md
          echo "Commit: ${{ github.sha }}" >> release-notes.md

          # Package library artifacts into tarballs
          for dir in artifacts/cunls-*; do
            [ -d "$dir" ] || continue
            NAME=$(basename "$dir")
            tar czf "release-assets/${NAME}.tar.gz" -C "$dir" .
          done

          echo "=== Release Notes ==="
          cat release-notes.md
          echo "=== Assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.release-notes.outputs.date }}
          name: "Nightly ${{ steps.release-notes.outputs.date }}"
          body_path: release-notes.md
          prerelease: true
          files: release-assets/*
