name: Nightly Build & Test

on:
  schedule:
    # 2:30 AM UTC — offset from the hour to reduce contention on shared infrastructure
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        type: boolean
        default: false
        description: 'Force build even without recent changes'

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Gate: skip the entire pipeline when nothing changed in the last 24 hours
  # ---------------------------------------------------------------------------
  check-changes:
    name: Check for recent changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect commits in the last 24 hours
        id: decide
        run: |
          COMMIT_COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
          FORCE="${{ github.event.inputs.force_build }}"
          if [ "${COMMIT_COUNT}" -gt 0 ] || [ "${FORCE}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Building: ${COMMIT_COUNT} commit(s) in last 24h, force=${FORCE}"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: no commits in last 24h and force=${FORCE}"
          fi

  # ---------------------------------------------------------------------------
  # x86_64 builds — runs on nvidia-isaac shared GPU runners (auto-scaling AWS)
  # CUDA/Ubuntu version is controlled by the container image, not runner tags.
  # Max 10 concurrent runners across the entire nvidia-isaac org; 4 jobs here
  # is a reasonable share alongside nvblox and other repos.
  # ---------------------------------------------------------------------------
  build-matrix:
    name: "${{ matrix.platform }} / ubuntu-${{ matrix.ubuntu }} / cuda-${{ matrix.cuda }}"
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64
            ubuntu: "22.04"
            cuda: "12.8.1"
            archs: "75;80;86;89"
            runner: '["self-hosted","gpu"]'
            image: "nvcr.io/cunls/cunls-ci:cuda12-ubuntu22.04-x86_64"

          - platform: x86_64
            ubuntu: "22.04"
            cuda: "13.2.0"
            archs: "75;80;86;89;100"
            runner: '["self-hosted","gpu"]'
            image: "nvcr.io/cunls/cunls-ci:cuda13-ubuntu22.04-x86_64"

          - platform: x86_64
            ubuntu: "24.04"
            cuda: "12.8.1"
            archs: "75;80;86;89"
            runner: '["self-hosted","gpu"]'
            image: "nvcr.io/cunls/cunls-ci:cuda12-ubuntu24.04-x86_64"

          - platform: x86_64
            ubuntu: "24.04"
            cuda: "13.2.0"
            archs: "75;80;86;89;100"
            runner: '["self-hosted","gpu"]'
            image: "nvcr.io/cunls/cunls-ci:cuda13-ubuntu24.04-x86_64"

          # ------------------------------------------------------------------
          # Jetson (aarch64) — DISABLED pending infra changes
          #
          # Jetson devices are static shared runners across nvidia-isaac org.
          # Do not schedule long builds on them — they block other teams.
          # Preferred pattern: build ARM64 Docker images on x86 runners, push
          # to NGC, and run Jetson tests through Osmo on a nightly cadence.
          #
          # To re-enable: uncomment the entries below and set the runner labels
          # to whatever the RPT team confirms after device onboarding.
          # The build parameters (archs, cuda, ubuntu) are ready to use.
          # ------------------------------------------------------------------
          # - platform: jetson
          #   ubuntu: "22.04"
          #   cuda: "12.8.1"
          #   archs: "72;87"
          #   runner: 'TBD — set after RPT confirms Jetson runner labels'
          #   image: "nvcr.io/cunls/cunls-ci:cuda12-ubuntu22.04-aarch64"
          #
          # - platform: jetson
          #   ubuntu: "22.04"
          #   cuda: "13.2.0"
          #   archs: "72;87"
          #   runner: 'TBD'
          #   image: "nvcr.io/cunls/cunls-ci:cuda13-ubuntu22.04-aarch64"
          #
          # - platform: jetson
          #   ubuntu: "24.04"
          #   cuda: "12.8.1"
          #   archs: "72;87"
          #   runner: 'TBD'
          #   image: "nvcr.io/cunls/cunls-ci:cuda12-ubuntu24.04-aarch64"
          #
          # - platform: jetson
          #   ubuntu: "24.04"
          #   cuda: "13.2.0"
          #   archs: "72;87"
          #   runner: 'TBD'
          #   image: "nvcr.io/cunls/cunls-ci:cuda13-ubuntu24.04-aarch64"

    uses: ./.github/workflows/build-and-test.yml
    with:
      cuda_version: ${{ matrix.cuda }}
      ubuntu_version: ${{ matrix.ubuntu }}
      platform: ${{ matrix.platform }}
      cuda_architectures: ${{ matrix.archs }}
      runner_labels: ${{ matrix.runner }}
      container_image: ${{ matrix.image }}

  # ---------------------------------------------------------------------------
  # Summary: single check that all matrix jobs succeeded
  # ---------------------------------------------------------------------------
  nightly-status:
    name: Nightly status
    runs-on: ubuntu-latest
    if: always()
    needs: [check-changes, build-matrix]
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.check-changes.outputs.should_build }}" = "false" ]; then
            echo "Nightly skipped: no changes in last 24 hours."
            exit 0
          fi
          if [ "${{ needs.build-matrix.result }}" = "success" ]; then
            echo "All nightly builds passed."
          else
            echo "One or more nightly builds failed: ${{ needs.build-matrix.result }}"
            exit 1
          fi
