name: Nightly Build & Test

on:
  schedule:
    # 2:30 AM UTC — offset from the hour to reduce contention on shared infrastructure
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        type: boolean
        default: false
        description: 'Force build even without recent changes'

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-changes:
    name: Check for recent changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect commits in the last 24 hours
        id: decide
        run: |
          COMMIT_COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
          FORCE="${{ github.event.inputs.force_build }}"
          if [ "${COMMIT_COUNT}" -gt 0 ] || [ "${FORCE}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Building: ${COMMIT_COUNT} commit(s) in last 24h, force=${FORCE}"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: no commits in last 24h and force=${FORCE}"
          fi

  build-matrix:
    name: "x86_64 / ubuntu-${{ matrix.ubuntu }} / cuda-${{ matrix.cuda }}"
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: [self-hosted, gpu]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - { ubuntu: "22.04", cuda: "12.8.1", archs: "75;80;86;89" }
          - { ubuntu: "22.04", cuda: "13.2.0", archs: "75;80;86;89;100" }
          - { ubuntu: "24.04", cuda: "12.8.1", archs: "75;80;86;89" }
          - { ubuntu: "24.04", cuda: "13.2.0", archs: "75;80;86;89;100" }

          # Jetson (aarch64) — DISABLED pending infra changes.
          # To re-enable: add entries with archs: "72;87" and the confirmed
          # Jetson runner labels from the RPT team.

    steps:
      - name: Verify GPU
        run: nvidia-smi

      - uses: actions/checkout@v5

      - name: Build C++ libraries
        run: |
          CUDA_VERSION=${{ matrix.cuda }} \
          UBUNTU_VERSION=${{ matrix.ubuntu }} \
          EXTRA_CMAKE_ARGS="-DBUILD_TESTING=ON -DCMAKE_CUDA_ARCHITECTURES=${{ matrix.archs }}" \
          ./scripts/build_cunls_in_docker.sh Release ./output

      - name: Run C++ tests
        run: ./scripts/test_cunls_in_docker.sh ./output

      - name: Build Python wheel
        run: |
          CUDA_VERSION=${{ matrix.cuda }} \
          UBUNTU_VERSION=${{ matrix.ubuntu }} \
          ./scripts/build_pycunls_in_docker.sh ./output/wheel

      - name: Run Python tests
        run: ./scripts/test_pycunls_in_docker.sh ./output/wheel

      - name: Upload C++ test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-cpp-x86_64-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: output/cpp-test-results.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Python test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-python-x86_64-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: output/wheel/python-test-results.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Upload shared library
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cunls-shared-x86_64-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: output/shared/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload static library
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cunls-static-x86_64-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: output/static/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Python wheel
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pycunls-x86_64-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: output/wheel/*.whl
          retention-days: 30
          if-no-files-found: warn

  nightly-status:
    name: Nightly status & release
    runs-on: ubuntu-latest
    if: always()
    needs: [check-changes, build-matrix]
    permissions:
      contents: write
    steps:
      - name: Check result
        id: check
        run: |
          if [ "${{ needs.check-changes.outputs.should_build }}" = "false" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Nightly skipped: no changes in last 24 hours."
          elif [ "${{ needs.build-matrix.result }}" != "success" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "One or more nightly builds failed: ${{ needs.build-matrix.result }}"
            exit 1
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "All nightly builds passed — creating release."
          fi

      - uses: actions/checkout@v5
        if: steps.check.outputs.skip == 'false'

      - name: Download all artifacts
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate release notes and package assets
        if: steps.check.outputs.skip == 'false'
        id: release-notes
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          mkdir -p release-assets

          cat > release-notes.md << 'HEADER'
          ## Test Results

          | Configuration | Tests | Passed | Failed | Time |
          |---|---|---|---|---|
          HEADER
          sed -i 's/^          //' release-notes.md

          for dir in artifacts/test-results-cpp-*; do
            [ -d "$dir" ] || continue
            CONFIG=$(basename "$dir" | sed 's/test-results-cpp-//' | sed 's/-/ \/ /g' | sed 's/cuda/cuda-/' | sed 's/ubuntu/ubuntu-/')
            XML=$(find "$dir" -name "*.xml" | head -1)
            if [ -f "$XML" ]; then
              TESTS=$(grep -oP 'tests="\K[0-9]+' "$XML" | head -1)
              FAILURES=$(grep -oP 'failures="\K[0-9]+' "$XML" | head -1)
              TIME=$(grep -oP 'time="\K[0-9.]+' "$XML" | head -1)
              TESTS=${TESTS:-"?"}
              FAILURES=${FAILURES:-"?"}
              TIME=${TIME:-"?"}
              if [ "$TESTS" != "?" ] && [ "$FAILURES" != "?" ]; then
                PASSED=$((TESTS - FAILURES))
              else
                PASSED="?"
              fi
              echo "| ${CONFIG} | ${TESTS} | ${PASSED} | ${FAILURES} | ${TIME}s |" >> release-notes.md
              cp "$XML" "release-assets/$(basename "$dir").xml"
            fi
          done

          for dir in artifacts/test-results-python-*; do
            [ -d "$dir" ] || continue
            CONFIG=$(basename "$dir" | sed 's/test-results-python-//' | sed 's/-/ \/ /g' | sed 's/cuda/cuda-/' | sed 's/ubuntu/ubuntu-/')
            XML=$(find "$dir" -name "*.xml" | head -1)
            if [ -f "$XML" ]; then
              TESTS=$(grep -oP 'tests="\K[0-9]+' "$XML" | head -1)
              FAILURES=$(grep -oP 'failures="\K[0-9]+' "$XML" | head -1)
              TIME=$(grep -oP 'time="\K[0-9.]+' "$XML" | head -1)
              TESTS=${TESTS:-"?"}
              FAILURES=${FAILURES:-"?"}
              TIME=${TIME:-"?"}
              if [ "$TESTS" != "?" ] && [ "$FAILURES" != "?" ]; then
                PASSED=$((TESTS - FAILURES))
              else
                PASSED="?"
              fi
              echo "| ${CONFIG} (python) | ${TESTS} | ${PASSED} | ${FAILURES} | ${TIME}s |" >> release-notes.md
              cp "$XML" "release-assets/$(basename "$dir").xml"
            fi
          done

          echo "" >> release-notes.md
          echo "Commit: ${{ github.sha }}" >> release-notes.md

          for dir in artifacts/cunls-shared-* artifacts/cunls-static-*; do
            [ -d "$dir" ] || continue
            NAME=$(basename "$dir")
            tar czf "release-assets/${NAME}.tar.gz" -C "$dir" .
          done

          for dir in artifacts/pycunls-*; do
            [ -d "$dir" ] || continue
            for whl in "$dir"/*.whl; do
              [ -f "$whl" ] || continue
              cp "$whl" "release-assets/$(basename "$dir")-$(basename "$whl")"
            done
          done

          echo "=== Release Notes ==="
          cat release-notes.md
          echo "=== Assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.release-notes.outputs.date }}
          name: "Nightly ${{ steps.release-notes.outputs.date }}"
          body_path: release-notes.md
          prerelease: true
          files: release-assets/*
