name: 'CMake Build & Test cuNLS'
description: 'Configure, build, and test cuNLS with parameterized CUDA settings'

inputs:
  cuda_architectures:
    description: 'Semicolon-separated CUDA compute capabilities (e.g. "75;80;86;89")'
    required: true
  build_type:
    description: 'CMake build type'
    required: false
    default: 'Release'
  build_testing:
    description: 'Enable test compilation'
    required: false
    default: 'ON'
  extra_cmake_args:
    description: 'Additional CMake arguments'
    required: false
    default: ''
  parallel_jobs:
    description: 'Number of parallel build jobs (0 = nproc)'
    required: false
    default: '0'

outputs:
  build_dir:
    description: 'Path to the CMake build directory'
    value: ${{ steps.configure.outputs.build_dir }}
  test_results:
    description: 'Path to test results XML'
    value: ${{ steps.test.outputs.results_path }}

runs:
  using: composite
  steps:
    - name: Configure CMake
      id: configure
      shell: bash
      run: |
        BUILD_DIR="${GITHUB_WORKSPACE}/build"
        cmake -B "${BUILD_DIR}" \
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
          -DCMAKE_CUDA_ARCHITECTURES="${{ inputs.cuda_architectures }}" \
          -DBUILD_TESTING=${{ inputs.build_testing }} \
          ${{ inputs.extra_cmake_args }} \
          -G "Unix Makefiles"
        echo "build_dir=${BUILD_DIR}" >> "$GITHUB_OUTPUT"

    - name: Build
      shell: bash
      run: |
        JOBS=${{ inputs.parallel_jobs }}
        if [ "${JOBS}" = "0" ]; then
          JOBS=$(nproc)
        fi
        cmake --build "${{ steps.configure.outputs.build_dir }}" -j"${JOBS}"

    - name: Run tests
      id: test
      if: inputs.build_testing == 'ON'
      shell: bash
      run: |
        RESULTS_DIR="${{ steps.configure.outputs.build_dir }}/test-results"
        mkdir -p "${RESULTS_DIR}"
        echo "results_path=${RESULTS_DIR}/results.xml" >> "$GITHUB_OUTPUT"
        cd "${{ steps.configure.outputs.build_dir }}"
        ctest --output-on-failure --output-junit "${RESULTS_DIR}/results.xml"
